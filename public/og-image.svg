<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo azul oscuro -->
  <rect width="1200" height="630" fill="#0a1628"/>

  <!-- Bandera de Colombia estilizada -->
  <rect x="0" y="0" width="1200" height="315" fill="#FCD116" opacity="0.1"/>
  <rect x="0" y="315" width="1200" height="157.5" fill="#003893" opacity="0.1"/>
  <rect x="0" y="472.5" width="1200" height="157.5" fill="#CE1126" opacity="0.1"/>

  <!-- Líneas decorativas con colores de Colombia -->
  <line x1="100" y1="200" x2="400" y2="200" stroke="#FCD116" stroke-width="4" opacity="0.6"/>
  <line x1="100" y1="220" x2="300" y2="220" stroke="#003893" stroke-width="4" opacity="0.6"/>
  <line x1="100" y1="240" x2="200" y2="240" stroke="#CE1126" stroke-width="4" opacity="0.6"/>

  <!-- Texto principal -->
  <text x="600" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="bold" fill="white" text-anchor="middle">Colombia-IA</text>

  <!-- Subtítulo -->
  <text x="600" y="350" font-family="system-ui, -apple-system, sans-serif" font-size="32" fill="#94a3b8" text-anchor="middle">Inteligencia Artificial para Colombia</text>

  <!-- Descripción -->
  <text x="600" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#64748b" text-anchor="middle">Comunidad Open Source | Aprende | Experimenta | Comparte</text>

  <!-- Decoración inferior con colores de Colombia -->
  <rect x="400" y="500" width="100" height="8" fill="#FCD116" rx="4"/>
  <rect x="550" y="500" width="100" height="8" fill="#003893" rx="4"/>
  <rect x="700" y="500" width="100" height="8" fill="#CE1126" rx="4"/>
</svg>
